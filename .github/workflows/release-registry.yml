name: release-registry
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'
jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify canonical registry contract
        run: node scripts/validate-registry.mjs --check
      - name: Verify deterministic sync
        run: node scripts/validate-registry.mjs --write && git diff --exit-code
      - name: Registry release ready
        run: echo "Registry validated, signed envelope verified, and release snapshot is deterministic"
